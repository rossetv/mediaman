# Minimal example compose file. Copy to your deployment and customise.
# All ${VAR:-default} placeholders read from an .env file (see .env.example).
services:
  mediaman:
    build: .
    image: mediaman:latest
    container_name: mediaman
    environment:
      - MEDIAMAN_SECRET_KEY=${MEDIAMAN_SECRET_KEY}
      - MEDIAMAN_PORT=${MEDIAMAN_PORT:-8282}
      - MEDIAMAN_DATA_DIR=${MEDIAMAN_DATA_DIR:-/data}
      - MEDIAMAN_BIND_HOST=${MEDIAMAN_BIND_HOST:-0.0.0.0}
      - MEDIAMAN_TRUSTED_PROXIES=${MEDIAMAN_TRUSTED_PROXIES:-}
      # Colon-separated list of filesystem roots inside which mediaman may
      # delete files. Required for deletion to work; fails closed if unset.
      # Example: MEDIAMAN_DELETE_ROOTS=/media:/media2
      - MEDIAMAN_DELETE_ROOTS=${MEDIAMAN_DELETE_ROOTS:-}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data:/data
      # Replace /path/to/your/media with the actual path on your host.
      # :ro (read-only) is the safe default — mediaman only needs write
      # access to media roots listed in MEDIAMAN_DELETE_ROOTS. If you
      # enable deletion, add a second rw-mounted volume for the roots
      # that mediaman is allowed to delete from.
      - /path/to/your/media:/media:ro
    ports:
      - "${MEDIAMAN_PORT:-8282}:${MEDIAMAN_PORT:-8282}"
    restart: unless-stopped
    # Harden the container: drop all capabilities and prevent privilege
    # escalation. The image hard-codes uid/gid 1000:1000 (mediaman user).
    # Ensure the host ./data directory is writable by uid 1000, e.g.:
    #   mkdir -p data && chown 1000:1000 data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # `read_only: true` is intentionally NOT set. A scan run writes ad-hoc
    # temp files via Python's `tempfile` (default: /tmp), the cryptography
    # library may write a small amount of state to /tmp, and uvicorn
    # logging buffers can spill there too. The /data volume already
    # carries every persistent write, so read_only would buy little
    # additional hardening while breaking the moving parts above. If a
    # future audit insists on a read-only rootfs, the right approach is
    # adding `tmpfs: /tmp` plus any cache dirs the runtime touches —
    # tracked separately rather than blocked on this rollout.
    #
    # Resource caps so a runaway scan or a memory leak in a third-party
    # client (Plex/Sonarr/Radarr) cannot starve the host. 1 GiB / 1 CPU
    # is comfortably above the steady-state footprint of a single
    # mediaman process under heavy scan load. Operators with very large
    # libraries (>500k items) can override.
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${MEDIAMAN_PORT:-8282}/healthz')\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
