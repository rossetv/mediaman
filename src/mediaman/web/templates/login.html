{% extends "base.html" %}

{% block title %}Sign In · Mediaman{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand"><a href="/">media<b>man</b></a></div>
    <div class="login-sub">Sign in to manage your library</div>

    {% if error %}
    <div class="error-msg" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" novalidate>
      <div class="login-field">
        <label for="username">Username</label>
        <input id="username" type="text" name="username"
               autocomplete="username" autocapitalize="none" spellcheck="false" autofocus required>
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required>
      </div>

      <button class="login-btn" type="submit">Sign in</button>
    </form>

    <p class="security-note">Secured connection · Rate limited to 5 attempts per minute</p>
  </div>
</div>
{% endblock %}
