<!DOCTYPE html>
<!-- CSP H65 status: script-src no longer permits 'unsafe-inline'.
     Every page-level inline <script> was extracted to static/js/ in
     Wave 7; the only remaining inline scripts are
     <script type="application/json"> data islands, which CSP does not
     gate. style-src still allows 'unsafe-inline' for the inline
     style="display:none" attributes scattered across templates —
     migrating those to CSS classes is the final cleanup step. -->
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mediaman{% endblock %}</title>
  <!-- CSS is split into per-concern fragments under static/css/.
       Order: tokens first, then _base.css (reset + layout primitives),
       then concern-specific files. Cascade follows source order, so
       later rules win when specificity is equal. -->
  <link rel="stylesheet" href="/static/css/_tokens.css">
  <link rel="stylesheet" href="/static/css/_base.css">
  <link rel="stylesheet" href="/static/css/_forms.css">
  <link rel="stylesheet" href="/static/css/_search.css">
  <link rel="stylesheet" href="/static/css/_tables.css">
  <link rel="stylesheet" href="/static/css/_storage.css">
  <link rel="stylesheet" href="/static/css/_history.css">
  <link rel="stylesheet" href="/static/css/_modal.css">
  <link rel="stylesheet" href="/static/css/_login.css">
  <link rel="stylesheet" href="/static/css/_nav.css">
  <link rel="stylesheet" href="/static/css/_buttons.css">
  <link rel="stylesheet" href="/static/css/_tiles.css">
  <link rel="stylesheet" href="/static/css/_dl.css">
  <link rel="stylesheet" href="/static/css/_download_page.css">
  <link rel="stylesheet" href="/static/css/_settings.css">
  <link rel="stylesheet" href="/static/css/_settings_pg.css">
  <link rel="stylesheet" href="/static/css/_settings_pg_panels.css">
  <link rel="stylesheet" href="/static/css/_keep.css">
  <link rel="stylesheet" href="/static/css/_ui_feedback.css">
  <link rel="stylesheet" href="/static/css/_utilities.css">
  <script src="/static/js/core/api.js" defer></script>
  <script src="/static/js/core/dom.js" defer></script>
  <script src="/static/js/core/modal.js" defer></script>
  <script src="/static/js/core/tiles.js" defer></script>
  <script src="/static/js/modal-a11y.js" defer></script>
  <script src="/static/js/ui-feedback.js" defer></script>
  <script src="/static/js/snooze-menu.js" defer></script>
  <script src="/static/js/nav.js" defer></script>
  <script src="/static/js/dl-poster.js" defer></script>
  <script src="/static/js/broken-poster.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body data-page="{{ nav_active or '' }}">
  <a class="skip-link" href="#main-content">Skip to content</a>
  {% block nav %}{% endblock %}
  <main id="main-content" tabindex="-1">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
