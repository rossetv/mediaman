<style>
  /* ===== DETAIL MODAL — inner content styles only.
     Outer shell (backdrop / sheet / close-bar) uses shared
     .modal-backdrop + .modal-sheet + .modal-close-bar from style.css. */

  /* Hero */
  .detail-modal-hero {
    position: relative; width: 100%; height: 360px; overflow: hidden;
    background: #1d1d1f;
  }
  .detail-modal-hero img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .detail-modal-hero-gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 200px;
    background: linear-gradient(to top, #0a0a0a 0%, rgba(10,10,10,0.8) 40%, transparent 100%);
  }
  .detail-modal-hero-info {
    position: absolute; bottom: 24px; left: 28px; right: 28px; z-index: 2;
  }
  .detail-modal-hero-title {
    font-size: 32px; font-weight: 700; line-height: 1.1; letter-spacing: -0.3px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .detail-modal-hero-title .year {
    font-weight: 400; color: rgba(255,255,255,0.5); font-size: 24px;
  }

  /* Body */
  .detail-modal-body { padding: 0 28px 28px; }

  /* Quick info bar */
  .detail-modal-quick {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px; padding-top: 4px;
  }
  .type-pill {
    padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    background: rgba(41,151,255,0.15); color: #2997ff;
  }
  .meta-text {
    font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: -0.12px;
  }

  /* Ratings */
  .detail-modal-ratings { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .rating-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: -0.12px;
  }
  .rating-pill .rating-icon {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1;
  }
  .rating-pill .rating-icon svg { display: block; }

  /* Tagline */
  .detail-modal-tagline {
    font-size: 15px; color: rgba(255,255,255,0.35); font-style: italic;
    margin-bottom: 16px; line-height: 1.4;
  }

  /* Description */
  .detail-modal-description {
    font-size: 15px; color: rgba(255,255,255,0.7);
    line-height: 1.65; margin-bottom: 16px; letter-spacing: -0.2px;
  }

  /* AI reason */
  .detail-modal-reason {
    font-size: 14px; color: #2997ff; font-style: italic;
    margin-bottom: 24px; line-height: 1.5;
    padding: 12px 16px;
    background: rgba(41,151,255,0.06);
    border-radius: 10px;
    border-left: 3px solid rgba(41,151,255,0.3);
  }

  /* Section labels */
  .detail-modal-section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: rgba(255,255,255,0.3);
    margin-bottom: 12px;
  }

  /* Trailer */
  .detail-modal-trailer { margin-bottom: 28px; }
  .detail-modal-trailer iframe {
    width: 100%; aspect-ratio: 16/9; border: none; border-radius: 12px;
  }
  .trailer-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: 10px;
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
    text-decoration: none; font-size: 14px; font-weight: 600;
    transition: all 0.2s; margin-bottom: 28px;
  }
  .trailer-link:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* Cast */
  .detail-modal-cast {
    display: flex; gap: 20px; overflow-x: auto;
    padding-bottom: 8px; margin-bottom: 24px;
    -webkit-overflow-scrolling: touch;
  }
  .detail-modal-cast::-webkit-scrollbar { height: 0; }
  .cast-item { text-align: center; flex-shrink: 0; min-width: 70px; }
  .cast-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    margin: 0 auto 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: rgba(255,255,255,0.3); font-weight: 600;
  }
  .cast-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); line-height: 1.3; }
  .cast-char { font-size: 11px; color: rgba(255,255,255,0.35); line-height: 1.3; margin-top: 2px; }

  /* Action bar — uses shared .modal-actions from style.css */

  /* Progress */
  .detail-modal-progress {
    margin-top: 20px; padding: 20px;
    background: rgba(255,255,255,0.03); border-radius: 12px;
  }
  .progress-status { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .progress-icon { flex-shrink: 0; display: flex; }
  .progress-status span { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
  .progress-bar-track {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden; margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%; width: 0%; background: #2997ff;
    border-radius: 3px; transition: width 0.6s ease;
  }
  .progress-detail { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: -0.12px; }
  .progress-hint {
    font-size: 13px; color: rgba(255,255,255,0.3); line-height: 1.6;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .spinner { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success */
  .detail-modal-success {
    text-align: center; margin-top: 20px; padding: 28px 20px;
    background: rgba(48,209,88,0.04); border-radius: 12px;
    border: 1px solid rgba(48,209,88,0.1);
  }
  .success-icon { margin-bottom: 12px; }
  .success-icon svg { animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-title { font-size: 20px; font-weight: 600; color: #30d158; letter-spacing: -0.3px; margin-bottom: 4px; }
  .success-detail { font-size: 14px; color: rgba(255,255,255,0.5); }

  @media (max-width: 639px) {
    .detail-modal-hero { height: 240px; }
    .detail-modal-hero-title { font-size: 22px; }
    .detail-modal-hero-title .year { font-size: 17px; }
    .detail-modal-body { padding: 0 16px 24px; }
    .detail-modal-hero-info { left: 16px; right: 16px; bottom: 16px; }
  }

  /* Season picker */
  .detail-modal-seasons {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .detail-modal-seasons-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .detail-modal-seasons-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: rgba(255,255,255,0.8);
  }
  .detail-modal-seasons-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px;
  }
  .detail-modal-season {
    position: relative; display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .detail-modal-season:hover { background: rgba(255,255,255,0.07); }
  .detail-modal-season.checked {
    background: rgba(41,151,255,0.12);
    border-color: rgba(41,151,255,0.4);
  }
  .detail-modal-season-check {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .detail-modal-season.checked .detail-modal-season-check {
    background: #2997ff; border-color: #2997ff;
  }
  .detail-modal-season.checked .detail-modal-season-check::after {
    content: ""; display: block; width: 4px; height: 9px;
    border: solid #fff; border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .detail-modal-season.already {
    background: rgba(48,209,88,0.06);
    border-color: rgba(48,209,88,0.2); cursor: default;
  }
  .detail-modal-season.already .detail-modal-season-check {
    background: rgba(48,209,88,0.25); border-color: rgba(48,209,88,0.5);
  }
  .detail-modal-season.already .detail-modal-season-check::after {
    content: ""; display: block; width: 4px; height: 9px;
    border: solid #30d158; border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .detail-modal-season-name { font-size: 14px; font-weight: 600; color: #fff; }
  .detail-modal-season-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
  .detail-modal-season-summary {
    margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.5);
  }
  .detail-modal-seasons-link {
    background: none; border: none; color: #2997ff;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit;
  }
  .detail-modal-seasons-link:hover { text-decoration: underline; }

  .sug-state.partial, .poster-state.partial {
    background: rgba(255,159,10,0.2); color: #ff9f0a;
  }
</style>

<div id="detail-modal" class="modal-backdrop" style="display:none;">
  <div class="modal-sheet">
    <button type="button" class="modal-close-bar" onclick="closeModal()" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Close
    </button>

    <div class="detail-modal-hero" id="modal-hero"></div>

    <div class="detail-modal-body">
      <div id="modal-quick" class="detail-modal-quick"></div>
      <div id="modal-ratings" class="detail-modal-ratings"></div>
      <div id="modal-tagline" class="detail-modal-tagline"></div>
      <div id="modal-desc" class="detail-modal-description"></div>
      <div id="modal-reason" class="detail-modal-reason"></div>
      <div id="modal-trailer-label" class="detail-modal-section-label">Trailer</div>
      <div id="modal-trailer" class="detail-modal-trailer"></div>
      <div id="modal-trailer-fallback"></div>
      <div id="modal-cast-label" class="detail-modal-section-label">Cast</div>
      <div id="modal-cast" class="detail-modal-cast"></div>
      <div id="modal-actions" class="modal-actions"></div>
      <div id="modal-progress" class="detail-modal-progress" style="display:none;"></div>
      <div id="modal-success" class="detail-modal-success" style="display:none;"></div>
      <div id="detail-modal-seasons-label" class="detail-modal-section-label" style="display:none;">Seasons — pick which to download</div>
      <div id="detail-modal-seasons" class="detail-modal-seasons" style="display:none;"></div>
    </div>
  </div>
</div>
