{% extends "base.html" %}

{% block title %}Search · Mediaman{% endblock %}

{% block nav %}{% include "_nav.html" %}{% endblock %}

{% block content %}
<div class="container">
  <div class="ph">
    <h1>Search</h1>
    <p>Find a movie, show, or anime to add to your library.</p>
  </div>

  <div class="search-box search-wrap" id="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" class="search-input" placeholder="Search for a movie, show, or anime…" autocomplete="off" />
    <div class="search-spinner" id="search-spinner"></div>
  </div>

  <div id="shelves"></div>

  <div class="page-bottom-spacer"></div>
</div>

{% include "_detail_modal.html" %}

<script src="/static/js/search.js" defer></script>
{% endblock %}
