name: Feature request
description: Propose a new feature or enhancement for mediaman.
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: >
        What problem does this solve? What are you trying to do that
        mediaman does not currently support?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >
        Describe the feature you would like. Be as specific as possible:
        which part of the UI or API would change, what the new behaviour
        would be, and what it would look like from a user's perspective.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: >
        Have you considered any alternative solutions or workarounds?
        Why are they insufficient?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or links that may be useful.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this has not already been requested.
          required: true
        - label: I am willing to open a pull request implementing this feature.
          required: false
