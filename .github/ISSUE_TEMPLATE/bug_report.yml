name: Bug report
description: Report a defect or unexpected behaviour in mediaman.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Security issues must not be filed here.** Use GitHub's private
        vulnerability reporting instead — see [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include error messages, log output, or screenshots.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mediaman version or commit
      placeholder: "e.g. v0.1.0 or ae4b7ba"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.9"
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker (docker compose)
        - Docker (manual)
        - Direct (virtualenv / pip)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log lines here. Redact hostnames, tokens, and personal data.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have redacted any hostnames, tokens, or personal data from logs and screenshots.
          required: true
