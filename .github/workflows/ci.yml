name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same branch/PR when a new one is triggered.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs opt in to the permissions they need.
permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Single-version matrix today; expansion (e.g. add 3.13) is a one-line
        # change once we drop the requires-python upper bound in pyproject.
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Don't leave GITHUB_TOKEN in .git/config after checkout — this job
          # never pushes, only reads. Same applies to every other job below.
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock
          pip install -e ".[dev]"

      - name: Run tests
        # Coverage threshold lives in pyproject.toml ([tool.coverage.report]
        # fail_under). Don't override it here — one source of truth.
        # --maxfail bounds runtime when a refactor breaks many tests at once.
        run: pytest -q --cov=mediaman --cov-report=term-missing --cov-report=xml --maxfail=10

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa  # v6.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # Full-tree mypy, hard-failing. ignore_missing_imports stays on for
    # third-party libs without stubs; warn_unused_ignores stops dead
    # `# type: ignore` comments accumulating.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock
          pip install -e ".[dev]"

      - name: mypy
        run: mypy src/mediaman

  security-scan:
    name: Security scan (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: bandit
        # `-ll` reports MEDIUM severity and above (bandit's flag conventions:
        # -l surfaces LOW+, -ll MEDIUM+, -lll HIGH-only). Domain-11's claim
        # that the prior `-ll` filtered everything below HIGH was wrong;
        # `-ll` already includes MEDIUM, which is the intended gate. The
        # 24 LOW findings (mostly try/except/pass and assert-in-tests
        # patterns) are tracked as nosec exemptions in `bandit.yaml`.
        run: bandit -r src/ -c bandit.yaml -ll -f txt

  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit
        # Audit the concrete locked, hashed requirements file — that is the
        # set of versions we ship in the Docker image. Auditing pyproject
        # constraints would describe the loosest possible install rather
        # than the actual install, and pip itself (a CI-runner tool, not a
        # mediaman dependency) stays out of scope.
        run: pip-audit -r requirements.lock --require-hashes

  lock-up-to-date:
    name: requirements.lock up to date
    runs-on: ubuntu-latest
    # Major/minor Dependabot bumps to pyproject.toml don't regenerate the
    # lock file. This job catches drift so a pyproject change can't merge
    # without the matching lock refresh.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Verify lock matches pyproject
        # The committed lock is generated by `scripts/pin-lock.sh` with
        # --allow-unsafe --strip-extras. The CI verification must pass
        # the same flags or it will produce a content-different output
        # on every run (extras-as-markers vs stripped, plus pip /
        # setuptools missing) and fail the gate spuriously.
        #
        # Compare only the substantive lines — package name, version,
        # and hash. ``# via …`` and ``# This file is autogenerated…``
        # comment lines vary between Docker-pinned (the committed lock)
        # and bare-runner pip-tools regenerations even when every
        # installable artefact is identical. Filter out every comment
        # plus blank lines before diffing.
        run: |
          pip-compile \
            --quiet \
            --generate-hashes \
            --allow-unsafe \
            --strip-extras \
            --output-file requirements.lock.check \
            pyproject.toml
          # Strip comment-only and empty lines from both sides; what's
          # left is the package/version/hash content that has to match.
          strip_meta() { grep -vE '^\s*(#|$)' "$1"; }
          if ! diff -q <(strip_meta requirements.lock) \
                       <(strip_meta requirements.lock.check) >/dev/null; then
            echo "::error::requirements.lock is out of date. Run bash scripts/pin-lock.sh and commit the result."
            diff -u <(strip_meta requirements.lock) \
                    <(strip_meta requirements.lock.check) || true
            exit 1
          fi

  docker:
    name: Docker build
    # Gate the image push on every check-job, not just tests. A lint or
    # bandit regression is not an excuse to ship.
    needs: [tests, lint, typecheck, security-scan, dependency-audit, lock-up-to-date]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance/SBOM attestation enabled by default in v6 tries to
          # fetch the PR's git context from the public endpoint, which 500s
          # on Dependabot PRs. PR builds only validate the Dockerfile can
          # build; the main-branch push picks up attestation as normal.
          provenance: false
          sbom: false

      - name: Build and push
        if: github.event_name == 'push'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mediaman:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mediaman:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cloudflare-refresh:
    name: Cloudflare cache purge
    needs: docker
    # Guard: only run on the canonical repository so forks do not attempt
    # to contact the maintainer's Cloudflare zone.
    if: github.event_name == 'push' && github.repository == 'rossetv/mediaman'
    runs-on: ubuntu-latest

    env:
      CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      # Transient 5xx from the Cloudflare API shouldn't tank the run. Each
      # step retries up to 3 times with a short backoff. curl --fail-with-body
      # exits non-zero on 4xx/5xx so the retry loop sees real failures.
      - name: Enable Cloudflare Development Mode
        run: |
          set -e
          for attempt in 1 2 3; do
            if curl --fail-with-body -sS -X PATCH \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/settings/development_mode" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"value":"on"}'; then
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          exit 1

      - name: Purge Cloudflare cache
        run: |
          set -e
          for attempt in 1 2 3; do
            if curl --fail-with-body -sS -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"purge_everything":true}'; then
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          exit 1
