name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same branch/PR when a new one is triggered.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs opt in to the permissions they need.
permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Single-version matrix today; expansion (e.g. add 3.13) is a one-line
        # change once we drop the requires-python upper bound in pyproject.
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Don't leave GITHUB_TOKEN in .git/config after checkout — this job
          # never pushes, only reads. Same applies to every other job below.
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock
          pip install -e ".[dev]"

      - name: Run tests
        # Coverage threshold lives in pyproject.toml ([tool.coverage.report]
        # fail_under). Don't override it here — one source of truth.
        # --maxfail bounds runtime when a refactor breaks many tests at once.
        run: pytest -q --cov=mediaman --cov-report=term-missing --maxfail=10

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # Full-tree mypy, hard-failing. ignore_missing_imports stays on for
    # third-party libs without stubs; warn_unused_ignores stops dead
    # `# type: ignore` comments accumulating.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock
          pip install -e ".[dev]"

      - name: mypy
        run: mypy src/mediaman

  security-scan:
    name: Security scan (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: bandit
        # `-ll` reports MEDIUM severity and above (bandit's flag conventions:
        # -l surfaces LOW+, -ll MEDIUM+, -lll HIGH-only). Domain-11's claim
        # that the prior `-ll` filtered everything below HIGH was wrong;
        # `-ll` already includes MEDIUM, which is the intended gate. The
        # 24 LOW findings (mostly try/except/pass and assert-in-tests
        # patterns) are tracked as nosec exemptions in `bandit.yaml`.
        run: bandit -r src/ -c bandit.yaml -ll -f txt

  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit
        # Audit the concrete locked, hashed requirements file — that is the
        # set of versions we ship in the Docker image. Auditing pyproject
        # constraints would describe the loosest possible install rather
        # than the actual install, and pip itself (a CI-runner tool, not a
        # mediaman dependency) stays out of scope.
        run: pip-audit -r requirements.lock --require-hashes

  lock-up-to-date:
    name: requirements.lock up to date
    runs-on: ubuntu-latest
    # Major/minor Dependabot bumps to pyproject.toml don't regenerate the
    # lock file. This job catches drift so a pyproject change can't merge
    # without the matching lock refresh.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Verify lock matches pyproject
        # We are answering one question: does the committed lock still
        # satisfy pyproject.toml? We are NOT re-resolving the world to
        # whatever PyPI looks like at CI time — that would (and used to)
        # fail this gate every time an unrelated transitive published a
        # new version, even when nobody touched pyproject. Concretely we
        # had pydantic 2.13.3→2.13.4 and urllib3 2.6.3→2.7.0 break
        # consecutive PRs that hadn't gone near either package.
        #
        # The trick: seed the output file with the existing lock, then
        # run pip-compile WITHOUT --upgrade. pip-tools treats the seeded
        # file as constraints and only bumps pins that pyproject forces
        # it to bump. So:
        #   * pyproject unchanged → output == input, regardless of new
        #     PyPI releases. Gate passes.
        #   * pyproject tightened / added / removed a dep that the lock
        #     no longer satisfies → pip-compile must change pins →
        #     output != input → gate fails. This is the case the gate
        #     was designed to catch.
        #
        # Flags must mirror scripts/pin-lock.sh exactly (--allow-unsafe,
        # --strip-extras, --generate-hashes) or the regenerated content
        # diverges in shape from the committed lock even when every
        # installable artefact is identical.
        #
        # The strip_meta filter remains because ``# via …`` and ``# This
        # file is autogenerated…`` comment lines vary between Docker-
        # pinned (the committed lock) and bare-runner regenerations.
        run: |
          cp requirements.lock requirements.lock.check
          pip-compile \
            --quiet \
            --generate-hashes \
            --allow-unsafe \
            --strip-extras \
            --output-file requirements.lock.check \
            pyproject.toml
          # Strip comment-only and empty lines from both sides; what's
          # left is the package/version/hash content that has to match.
          strip_meta() { grep -vE '^\s*(#|$)' "$1"; }
          if ! diff -q <(strip_meta requirements.lock) \
                       <(strip_meta requirements.lock.check) >/dev/null; then
            echo "::error::requirements.lock no longer satisfies pyproject.toml. Run bash scripts/pin-lock.sh and commit the result."
            diff -u <(strip_meta requirements.lock) \
                    <(strip_meta requirements.lock.check) || true
            exit 1
          fi

  # Build each architecture on its OWN native runner, in parallel — amd64 on the
  # standard runner, arm64 on GitHub's free public-repo arm64 runner. This
  # avoids QEMU emulation entirely (an emulated arm64 build of this image is
  # minutes slower, almost all of it in apt/dpkg), so the wall-clock cost is
  # roughly one native build rather than amd64 + emulated-arm64 in series. The
  # tests and other check jobs run ONCE as the shared gate below; neither arch
  # leg re-runs them.
  docker-build:
    name: Build (${{ matrix.platform.arch }})
    # Gate the image build on every check-job, not just tests. A lint or
    # bandit regression is not an excuse to ship.
    needs: [tests, lint, typecheck, security-scan, dependency-audit, lock-up-to-date]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            runner: ubuntu-latest
            target: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: linux/arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          platforms: ${{ matrix.platform.target }}
          push: false
          # Per-arch gha cache scope so the two legs don't clobber each other.
          cache-from: type=gha,scope=${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform.arch }}
          # Provenance/SBOM stays off: it fetches the PR's git context from the
          # public endpoint, which 500s on Dependabot PRs, and it complicates
          # the push-by-digest path below. PR builds only validate that the
          # Dockerfile compiles natively on each arch — the safety net that
          # catches a missing aarch64 wheel hash in requirements.lock on the PR.
          provenance: false
          sbom: false

      - name: Build and push by digest
        id: build
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          platforms: ${{ matrix.platform.target }}
          # Push the per-arch image by content digest only (no tag). The human
          # tags are attached to the merged manifest list in docker-merge.
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/mediaman,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform.arch }}
          provenance: false
          sbom: false

      - name: Export digest
        if: github.event_name == 'push'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: digest-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the two per-arch digests into a single multi-arch manifest list and
  # attach the human tags. Cheap (no build) — just a registry-side manifest op.
  docker-merge:
    name: Docker manifest push
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          repo="${{ secrets.DOCKERHUB_USERNAME }}/mediaman"
          # Each file is named after a per-arch image digest; combine them into
          # one manifest list under both tags so `docker pull` auto-selects the
          # amd64 or arm64 variant per host.
          docker buildx imagetools create \
            -t "${repo}:latest" \
            -t "${repo}:sha-${{ github.sha }}" \
            $(printf "${repo}@sha256:%s " *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect "${{ secrets.DOCKERHUB_USERNAME }}/mediaman:sha-${{ github.sha }}"

  cloudflare-refresh:
    name: Cloudflare cache purge
    needs: docker-merge
    # Guard: only run on the canonical repository so forks do not attempt
    # to contact the maintainer's Cloudflare zone.
    if: github.event_name == 'push' && github.repository == 'rossetv/mediaman'
    runs-on: ubuntu-latest

    env:
      CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      # Transient 5xx from the Cloudflare API shouldn't tank the run. Each
      # step retries up to 3 times with a short backoff. curl --fail-with-body
      # exits non-zero on 4xx/5xx so the retry loop sees real failures.
      - name: Enable Cloudflare Development Mode
        run: |
          set -e
          for attempt in 1 2 3; do
            if curl --fail-with-body -sS -X PATCH \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/settings/development_mode" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"value":"on"}'; then
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          exit 1

      - name: Purge Cloudflare cache
        run: |
          set -e
          for attempt in 1 2 3; do
            if curl --fail-with-body -sS -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"purge_everything":true}'; then
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          exit 1
